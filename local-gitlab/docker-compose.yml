services:
  gitlab:
    image: ${LOCAL_GITLAB_IMAGE:-gitlab/gitlab-ce:14.10.5-ce.0}
    container_name: ai-code-review-local-gitlab
    restart: unless-stopped
    hostname: ${LOCAL_GITLAB_HOSTNAME:-localhost}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${LOCAL_GITLAB_HOSTNAME:-localhost}:${LOCAL_GITLAB_HTTP_PORT:-8929}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${LOCAL_GITLAB_SSH_PORT:-2424}
        gitlab_rails['initial_root_password'] = '${LOCAL_GITLAB_ROOT_PASSWORD:-Acr!9vKp47mQzLs2026}'
        gitlab_rails['allow_local_requests_from_web_hooks_and_services'] = true
        registry['enable'] = false
        prometheus_monitoring['enable'] = false
        gitlab_pages['enable'] = false
        mattermost['enable'] = false
        alertmanager['enable'] = false
        puma['worker_processes'] = 0
        sidekiq['max_concurrency'] = 5
        postgresql['shared_buffers'] = '128MB'
    ports:
      - "${LOCAL_GITLAB_HTTP_PORT:-8929}:8929"
      - "${LOCAL_GITLAB_SSH_PORT:-2424}:22"
    volumes:
      - ../.local/gitlab/config:/etc/gitlab
      - ../.local/gitlab/logs:/var/log/gitlab
      - ../.local/gitlab/data:/var/opt/gitlab
    shm_size: "256m"
