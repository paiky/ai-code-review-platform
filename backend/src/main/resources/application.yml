server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-code-review-backend
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_code_review?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.leaf.codereview: DEBUG
notification:
  dingtalk:
    webhook-url: ${DINGTALK_WEBHOOK_URL:}
    enabled: ${DINGTALK_ENABLED:true}

frontend:
  cors:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173}